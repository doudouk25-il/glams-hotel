<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#fdf8f5"/>

  <!-- Hat brim — large distinctive disc -->
  <ellipse cx="16" cy="9" rx="13" ry="4.5" fill="#1a1a1a"/>
  <!-- Hat crown -->
  <rect x="12" y="4" width="8" height="6" rx="2" fill="#1a1a1a"/>

  <!-- Head -->
  <circle cx="16" cy="15" r="2.2" fill="#2a2a2a"/>

  <!-- Sunglasses glint -->
  <line x1="14" y1="14.5" x2="18" y2="14.5" stroke="#a8365a" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Dress / body — fluffy bubble shape -->
  <path d="M12.5 17 C10 18 9.5 22 11 23 C12.5 24 14 24.5 16 24.5 C18 24.5 19.5 24 21 23 C22.5 22 22 18 19.5 17 C18.5 16.5 17.5 16.2 16 16.2 C14.5 16.2 13.5 16.5 12.5 17Z" fill="#1a1a1a"/>

  <!-- Legs -->
  <line x1="14.2" y1="24.5" x2="13.2" y2="30" stroke="#333" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="17.8" y1="24.5" x2="18.8" y2="30" stroke="#333" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Red heels -->
  <ellipse cx="13" cy="30.5" rx="2.2" ry="1.2" fill="#a8365a"/>
  <ellipse cx="19" cy="30.5" rx="2.2" ry="1.2" fill="#a8365a"/>
</svg>
